<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سينما الأصدقاء - الفخامة المغربية 🍿🇲🇦</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0b0f; color: #e2e8f0; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .moroccan-bg { background-color: #0d0d14; background-image: radial-gradient(circle at 50% 50%, transparent 20%, #0b0b0f 20%, #0b0b0f 40%, transparent 40%, transparent 60%, #0b0b0f 60%, #0b0b0f 80%, transparent 80%), linear-gradient(45deg, #161622 25%, transparent 25%, transparent 75%, #161622 75%, #161622), linear-gradient(45deg, #161622 25%, transparent 25%, transparent 75%, #161622 75%, #161622); background-size: 60px 60px; background-position: 0 0, 0 0, 30px 30px; }
        .container { width: 100%; max-width: 600px; padding: 15px; box-sizing: border-box; }
        .panel { background: #1f1f2e; padding: 15px; border-radius: 14px; border: 1px solid #2d2d44; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        h1 { color: #e50914; font-size: 24px; text-align: center; margin-bottom: 15px; text-shadow: 0 0 15px rgba(229,9,20,0.4); }
        input, button { padding: 12px; border-radius: 8px; border: none; font-size: 14px; margin: 6px 0; box-sizing: border-box; width: 100%; }
        input { background: #2a2a3d; color: white; border: 1px solid #3f3f5c; }
        .btn-main { background-color: #e50914; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-green { background-color: #10b981; color: white; cursor: pointer; font-weight: bold; }
        
        /* شاشات التطبيق */
        #login-screen, #main-screen, #cinema-screen { display: none; width: 100%; }
        #login-screen { display: block; margin-top: 50px; }
        
        /* معلومات المستخدم */
        .user-profile { display: flex; align-items: center; gap: 10px; background: #111116; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #e50914; }
        
        .room-list { background: #111116; padding: 10px; border-radius: 10px; max-height: 150px; overflow-y: auto; border: 1px solid #2d2d44; }
        .room-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #2d2d44; font-size: 13px; }
        .btn-go { background: #10b981; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; width: auto; margin:0; }

        /* السينما */
        .video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .video-overlay.locked { pointer-events: auto; }

        /* أزرار التحكم والاتصال */
        .controls-box { background: #1f1f2e; padding: 12px; border-radius: 12px; border: 1px solid #2d2d44; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .controls-row { display: flex; align-items: center; gap: 10px; justify-content: space-around; flex-wrap: wrap; }
        .btn-circle { background: #3b82f6; color: white; border: none; border-radius: 50%; font-size: 18px; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-circle.play { background: #e50914; width: 55px; height: 55px; font-size: 24px; box-shadow: 0 0 10px rgba(229,9,20,0.4); }
        .btn-circle.call { background: #10b981; }
        .btn-circle.video-call { background: #8b5cf6; }
        .btn-circle.end-call { background: #ef4444; display: none; }
        
        /* التايم لاين */
        .timeline-container { display: flex; align-items: center; gap: 8px; width: 100%; }
        .time-label { font-size: 12px; font-family: monospace; color: #94a3b8; }
        .custom-timeline { -webkit-appearance: none; width: 100%; height: 5px; border-radius: 3px; background: #475569; outline: none; }
        .custom-timeline::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #e50914; }

        /* الشات */
        .chat-box { background: #1f1f2e; border-radius: 12px; border: 1px solid #2d2d44; overflow: hidden; display: flex; flex-direction: column; height: 200px; margin-top: 10px; }
        .chat-messages { flex-grow: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #111116; }
        .msg { padding: 6px 12px; border-radius: 8px; max-width: 80%; font-size: 13px; }
        .msg.me { background: #3b82f6; align-self: flex-start; }
        .msg.friend { background: #2a2a3d; align-self: flex-end; }
        .chat-input-row { display: flex; padding: 5px; gap: 5px; background: #1f1f2e; }
        .chat-input-row input { margin: 0; }
        .chat-input-row button { width: auto; margin: 0; padding: 0 15px; }

        /* شاشات المكالمة */
        .call-videos { display: none; gap: 10px; margin-top: 10px; justify-content: center; }
        .call-videos video { width: 45%; border-radius: 8px; border: 2px solid #3f3f5c; background: #000; }
        .call-videos.active { display: flex; }

        .users-footer { margin-top: 20px; text-align: center; font-size: 14px; color: #f59e0b; background: rgba(31, 31, 46, 0.8); padding: 8px; border-radius: 20px; border: 1px solid #2d2d44; }
    </style>
</head>
<body id="mainBody" class="moroccan-bg">

    <div id="login-screen" class="container">
        <div class="panel" style="text-align: center;">
            <h1>🍿 سينما الأصدقاء</h1>
            <p style="color: #94a3b8; font-size: 14px;">سجل دخولك لحفظ غرفك وإعداداتك</p>
            
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
                 data-callback="handleGoogleLogin">
            </div>
            <div class="g_id_signin" data-type="standard" style="display:flex; justify-content:center; margin: 20px 0;"></div>
            
            <button class="btn-main" onclick="skipLogin()" style="background:#475569;">دخول كزائر (مؤقت) 👤</button>
        </div>
    </div>

    <div id="main-screen" class="container">
        <div class="user-profile" id="userProfile">
            <img id="userImg" src="https://via.placeholder.com/40" alt="User">
            <div>
                <h3 id="userName" style="margin: 0; font-size: 16px;">زائر</h3>
                <p id="userEmail" style="margin: 0; font-size: 12px; color: #94a3b8;">ضيف غير مسجل</p>
            </div>
        </div>
        
        <div class="panel">
            <input type="text" id="newRoomName" placeholder="اسم الغرفة (مثال: سهرة الخميس)...">
            <button class="btn-main" onclick="createNewRoom()">إنشاء غرفة جديدة 🏛️</button>
            
            <h3 style="font-size: 14px; margin-top: 20px;">📁 غرفك المحفوظة:</h3>
            <div id="savedRoomsContainer" class="room-list"></div>
        </div>

        <div class="users-footer">
            <span>👤 المطورين: </span><b>@sifali</b> <span style="color:#64748b;">&</span> <b>@modi_</b>
        </div>
    </div>

    <div id="cinema-screen" class="container">
        <button class="btn-green" onclick="copyRoomLink()" style="margin-bottom:10px;">🔗 نسخ رابط الغرفة وإرساله</button>
        
        <div class="video-wrapper" id="videoContainer">
            <div id="overlay" class="video-overlay"></div>
            <div id="player"></div>
        </div>

        <div class="controls-box">
            <div class="timeline-container">
                <span id="currentTime" class="time-label">00:00</span>
                <input type="range" id="timeline" class="custom-timeline" min="0" max="100" value="0" oninput="timelineDragged(this.value)">
                <span id="duration" class="time-label">00:00</span>
            </div>
            <div class="controls-row">
                <button class="btn-circle call" onclick="startCall(false)" title="مكالمة صوتية">📞</button>
                <button class="btn-circle video-call" onclick="startCall(true)" title="مكالمة فيديو">📹</button>
                <button class="btn-circle end-call" id="endCallBtn" onclick="endCurrentCall()" title="إنهاء المكالمة">❌</button>
                
                <button id="toggleBtn" class="btn-circle play" onclick="togglePlay()">▶</button>
                
                <button class="btn-circle" onclick="toggleFullscreen()" title="قلب الشاشة">🔄</button>
            </div>
        </div>

        <div class="call-videos" id="videoChatUI">
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        
        <div class="panel" style="margin-top:10px; padding:8px;">
            <input type="text" id="ytUrl" placeholder="رابط يوتيوب جديد هنا...">
            <button class="btn-main" onclick="changeVideo()">تحديث الرابط 🔄</button>
        </div>

        <div class="chat-box">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="رسالة..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                <button class="btn-green" onclick="sendChatMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        let player, peer, conn = null, currentCall = null;
        let isPlaying = false, isRemoteAction = false, currentUserEmail = "guest";
        const overlay = document.getElementById('overlay');
        const toggleBtn = document.getElementById('toggleBtn');
        let localStream = null;

        // 🟢 نظام تسجيل الدخول
        function handleGoogleLogin(response) {
            // فك تشفير بيانات جوجل (JWT)
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUserEmail = payload.email;
            document.getElementById('userName').textContent = payload.name;
            document.getElementById('userEmail').textContent = currentUserEmail;
            document.getElementById('userImg').src = payload.picture;
            
            showScreen('main-screen');
            loadSavedRooms();
        }

        function skipLogin() {
            showScreen('main-screen');
            loadSavedRooms();
        }

        function showScreen(id) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('cinema-screen').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            if(id === 'cinema-screen') document.getElementById('mainBody').classList.remove('moroccan-bg');
        }

        // 🟢 تهيئة يوتيوب
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: 'EdhzTQD7hnU',
                playerVars: { 'controls': 1, 'rel': 0, 'playsinline': 1 },
                events: { 'onReady': () => setInterval(syncPlayer, 100) }
            });
        }

        function syncPlayer() {
            if (!player || isRemoteAction) return;
            const state = player.getPlayerState();
            if (state === 1 && !isPlaying) { updateUI(true); sendSignal({ type: 'play', time: player.getCurrentTime() }); }
            else if (state === 2 && isPlaying) { updateUI(false); sendSignal({ type: 'pause', time: player.getCurrentTime() }); }
            updateTimeline();
        }

        function togglePlay() { isPlaying ? player.pauseVideo() : player.playVideo(); }
        
        function updateUI(play) {
            isPlaying = play;
            toggleBtn.textContent = play ? '⏸' : '▶';
            play ? overlay.classList.add('locked') : overlay.classList.remove('locked');
        }

        // 🟢 قلب الشاشة (وضع المسرح العرضي)
        function toggleFullscreen() {
            const elem = document.documentElement; // الشاشة كاملة
            if (!document.fullscreenElement) {
                elem.requestFullscreen().then(() => {
                    // محاولة إجبار الشاشة على الوضع العرضي (Landscape) للجوالات
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(e => console.log("الدوران غير مدعوم أو مرفوض:", e));
                    }
                }).catch(err => alert(`خطأ: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        }

        // 🟢 نظام الغرف (مرتبط بحساب المستخدم)
        function createNewRoom() {
            const name = document.getElementById('newRoomName').value.trim();
            if (!name) return alert("اكتب اسم الغرفة!");
            const roomId = "room_" + Math.random().toString(36).substr(2, 9);
            saveRoom(name, roomId);
            startSession(roomId, true);
        }

        function saveRoom(name, id) {
            const key = `rooms_${currentUserEmail}`;
            let rooms = JSON.parse(localStorage.getItem(key)) || [];
            rooms.push({ name, id });
            localStorage.setItem(key, JSON.stringify(rooms));
            loadSavedRooms();
        }

        function loadSavedRooms() {
            const key = `rooms_${currentUserEmail}`;
            let rooms = JSON.parse(localStorage.getItem(key)) || [];
            const container = document.getElementById('savedRoomsContainer');
            container.innerHTML = rooms.length ? "" : "<p>لا توجد غرف</p>";
            rooms.forEach(r => {
                container.innerHTML += `<div class="room-item"><span>🏛️ ${r.name}</span><button class="btn-go" onclick="startSession('${r.id}', true)">دخول</button></div>`;
            });
        }

        // 🟢 الاتصال والمزامنة
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('join')) startSession(urlParams.get('join'), false);
        };

        function startSession(roomId, isHost) {
            showScreen('cinema-screen');
            peer = new Peer(isHost ? roomId : undefined);
            
            peer.on('open', () => {
                if (!isHost) {
                    conn = peer.connect(roomId);
                    setupConn();
                }
            });

            peer.on('connection', c => { conn = c; setupConn(); appendMsg("صديقك دخل الغرفة!", "friend"); });
            
            // استقبال المكالمات
            peer.on('call', call => {
                // نسأل المستخدم إذا يبي يرد
                if(confirm("صديقك يتصل بك! هل تريد الرد؟")) {
                    navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                        localStream = stream;
                        document.getElementById('localVideo').srcObject = stream;
                        document.getElementById('videoChatUI').classList.add('active');
                        document.getElementById('endCallBtn').style.display = 'flex';
                        
                        call.answer(stream); // الرد بالمقطع الصوتي/المرئي تبعنا
                        currentCall = call;
                        
                        call.on('stream', remoteStream => {
                            document.getElementById('remoteVideo').srcObject = remoteStream;
                        });
                    });
                }
            });
        }

        function setupConn() {
            conn.on('data', d => {
                if (d.type === 'chat') return appendMsg(d.text, 'friend');
                isRemoteAction = true;
                if (d.type === 'play') { player.seekTo(d.time, true); player.playVideo(); updateUI(true); }
                else if (d.type === 'pause') { player.pauseVideo(); player.seekTo(d.time, true); updateUI(false); }
                else if (d.type === 'change') player.loadVideoById(d.id);
                else if (d.type === 'seek') player.seekTo(d.time, true);
                setTimeout(() => isRemoteAction = false, 500);
            });
        }

        // 🟢 نظام المكالمات (صوت وفيديو)
        function startCall(withVideo) {
            if(!conn) return alert("انتظر حتى يدخل صديقك الغرفة أولاً!");
            
            navigator.mediaDevices.getUserMedia({video: withVideo, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                
                if(withVideo) document.getElementById('videoChatUI').classList.add('active');
                document.getElementById('endCallBtn').style.display = 'flex';
                
                currentCall = peer.call(conn.peer, stream);
                currentCall.on('stream', remoteStream => {
                    if(withVideo) document.getElementById('remoteVideo').srcObject = remoteStream;
                });
            }).catch(err => alert("يرجى إعطاء صلاحية الكاميرا والمايكروفون!"));
        }

        function endCurrentCall() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('videoChatUI').classList.remove('active');
            document.getElementById('endCallBtn').style.display = 'none';
        }

        // 🟢 الوظائف المساعدة (شات، تايم لاين، روابط)
        function sendSignal(d) { if (conn && conn.open) conn.send(d); }
        function copyRoomLink() { navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?join=" + (peer.id)); alert("تم النسخ!"); }
        function formatTime(s) { let m=Math.floor(s/60); s=Math.floor(s%60); return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }
        
        function updateTimeline() {
            if (player && player.getDuration) {
                const cur = player.getCurrentTime(), dur = player.getDuration();
                document.getElementById('timeline').value = (cur/dur)*100 || 0;
                document.getElementById('currentTime').textContent = formatTime(cur);
                document.getElementById('duration').textContent = formatTime(dur);
            }
        }
        function timelineDragged(v) { if(player){ const t = (v/100)*player.getDuration(); player.seekTo(t,true); sendSignal({type:'seek', time:t}); } }
        
        function sendChatMessage() {
            const v = document.getElementById('chatInput').value.trim();
            if (!v) return;
            appendMsg(v, 'me'); sendSignal({type: 'chat', text: v}); document.getElementById('chatInput').value = '';
        }
        function appendMsg(t, s) {
            const b = document.getElementById('chatMessages');
            b.innerHTML += `<div class="msg ${s}">${t}</div>`;
            b.scrollTop = b.scrollHeight;
        }
        function changeVideo() {
            const match = document.getElementById('ytUrl').value.match(/[?&]v=([^&#]+)/);
            const id = match ? match[1] : document.getElementById('ytUrl').value;
            if (id.length === 11) { player.loadVideoById(id); sendSignal({type: 'change', id}); }
        }
    </script>
</body>
</html>
